spring.application.name=scheduling
server.port=${PORT:8080}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:${MYSQLHOST:localhost}}:${MYSQL_PORT:${MYSQLPORT:3306}}/${MYSQL_DATABASE:${MYSQLDATABASE:fsadproject}}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:${MYSQLUSER:root}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:${MYSQLPASSWORD:${MYSQL_ROOT_PASSWORD:}}}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Frontend URL for password reset links and CORS.
# Set APP_FRONTEND_BASE_URL to your deployed frontend URL, for example:
# APP_FRONTEND_BASE_URL=https://your-app.vercel.app
app.frontend.base-url=${APP_FRONTEND_BASE_URL:https://fsad-frontend-1uro.onrender.com}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://fsad-frontend-1uro.onrender.com,http://localhost:5173,http://127.0.0.1:5173}
app.jwt.secret=${JWT_SECRET:change-this-dev-secret-key-32-chars-min}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

